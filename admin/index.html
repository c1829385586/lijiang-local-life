<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>丽江本地生活 - 后台管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; }
    .login-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .login-card { background: #fff; padding: 40px; border-radius: 12px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-title { text-align: center; font-size: 24px; font-weight: bold; color: #333; margin-bottom: 8px; }
    .login-sub { text-align: center; color: #999; margin-bottom: 30px; font-size: 14px; }
    .layout { display: flex; height: 100vh; }
    .sidebar { width: 220px; background: #1a1a2e; color: #fff; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; }
    .sidebar-logo { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-logo h2 { font-size: 16px; color: #E8885A; }
    .sidebar-logo p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .sidebar-menu { flex: 1; overflow-y: auto; }
    .menu-item { padding: 14px 24px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; font-size: 14px; color: rgba(255,255,255,0.7); }
    .menu-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .menu-item.active { background: rgba(232,136,90,0.2); color: #E8885A; border-right: 3px solid #E8885A; }
    .menu-icon { font-size: 18px; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar { height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .top-bar h3 { font-size: 18px; color: #333; }
    .content-area { flex: 1; padding: 20px; overflow-y: auto; }
    .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: transform 0.2s; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .stat-card .label { font-size: 13px; color: #999; }
    .stat-card .value { font-size: 28px; font-weight: bold; color: #333; margin-top: 8px; }
    .stat-card .extra { font-size: 12px; color: #E8885A; margin-top: 4px; }
    .stat-card.blue .value { color: #4A90B8; }
    .stat-card.green .value { color: #6AAF7C; }
    .stat-card.purple .value { color: #8B7EC8; }
    .stat-card.red .value { color: #D46B6B; }
    .table-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .table-header h4 { font-size: 16px; }
    .table-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .pagination-wrap { margin-top: 16px; display: flex; justify-content: flex-end; }
    .tag-hotel { background: #E8F4FD; color: #007AFF; }
    .tag-food { background: #FFF3ED; color: #E8885A; }
    .tag-travel { background: #E8F8E8; color: #6AAF7C; }
    .tag-product { background: #F0F0FF; color: #8B7EC8; }
    .empty-state { text-align: center; padding: 60px; color: #999; }
    .detail-section { margin-bottom: 16px; }
    .detail-section h5 { font-size: 14px; color: #333; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #f0f0f0; }
    .detail-row { display: flex; padding: 6px 0; font-size: 13px; }
    .detail-row .label { width: 80px; color: #999; flex-shrink: 0; }
    .detail-row .value { color: #333; flex: 1; word-break: break-all; }
    .review-images { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .review-images img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
    .review-images img:hover { transform: scale(1.05); }
    .rating-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .rating-bar .bar-wrap { flex: 1; background: #f0f0f0; border-radius: 4px; height: 20px; overflow: hidden; }
    .rating-bar .bar-fill { height: 100%; transition: width 0.3s; border-radius: 4px; }
    .rating-bar .count { width: 40px; color: #999; font-size: 12px; }
    .setting-section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .setting-section h4 { margin-bottom: 16px; font-size: 15px; }
    .order-info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar .menu-item span:not(.menu-icon) { display: none; }
      .sidebar-logo h2 { font-size: 12px; }
      .sidebar-logo p { display: none; }
      .stat-cards { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 登录页 -->
    <div class="login-page" v-if="!logged">
      <div class="login-card">
        <div class="login-title">🏔️ 丽江本地生活</div>
        <div class="login-sub">后台管理系统</div>
        <el-form @submit.prevent="doLogin">
          <el-form-item>
            <el-input v-model="loginForm.password" type="password" placeholder="请输入管理员密码" size="large" show-password @keyup.enter="doLogin">
              <template #prefix><span>🔒</span></template>
            </el-input>
          </el-form-item>
          <el-button type="primary" size="large" style="width:100%;background:linear-gradient(135deg,#E8885A,#D46B6B);border:none" @click="doLogin" :loading="loginLoading">
            登 录
          </el-button>
        </el-form>
        <p style="text-align:center;color:#ccc;font-size:12px;margin-top:16px">默认密码: admin123</p>
      </div>
    </div>

    <!-- 后台主界面 -->
    <div class="layout" v-else>
      <!-- 侧边栏 -->
      <div class="sidebar">
        <div class="sidebar-logo">
          <h2>🏔️ 丽江本地生活</h2>
          <p>后台管理 v2.0</p>
        </div>
        <div class="sidebar-menu">
          <div v-for="item in menuItems" :key="item.key" class="menu-item" :class="{ active: currentPage === item.key }" @click="currentPage = item.key">
            <span class="menu-icon">{{ item.icon }}</span>
            <span>{{ item.label }}</span>
          </div>
        </div>
        <div style="padding:16px;border-top:1px solid rgba(255,255,255,0.1)">
          <div class="menu-item" @click="showPasswordDialog = true" style="color:rgba(255,255,255,0.5)">
            <span class="menu-icon">🔑</span><span>修改密码</span>
          </div>
          <div class="menu-item" @click="doLogout" style="color:#D46B6B">
            <span class="menu-icon">🚪</span><span>退出登录</span>
          </div>
        </div>
      </div>

      <!-- 主内容区 -->
      <div class="main-content">
        <div class="top-bar">
          <h3>{{ currentTitle }}</h3>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="color:#999;font-size:13px">{{ currentTime }}</span>
            <el-button size="small" @click="refreshPage">🔄 刷新</el-button>
          </div>
        </div>
        <div class="content-area">

          <!-- ========== 数据概览 ========== -->
          <template v-if="currentPage === 'dashboard'">
            <div class="stat-cards">
              <div class="stat-card"><div class="label">总商家数</div><div class="value">{{ dashboard.totalStores || 0 }}</div><div class="extra">🏪</div></div>
              <div class="stat-card blue"><div class="label">总订单数</div><div class="value">{{ dashboard.totalOrders || 0 }}</div><div class="extra">近7天 {{ dashboard.weekOrders || 0 }} 单</div></div>
              <div class="stat-card green"><div class="label">总用户数</div><div class="value">{{ dashboard.totalUsers || 0 }}</div><div class="extra">👤</div></div>
              <div class="stat-card purple"><div class="label">今日营收</div><div class="value">¥{{ dashboard.todayRevenue || 0 }}</div><div class="extra">今日 {{ dashboard.todayOrders || 0 }} 单</div></div>
            </div>
            <div class="stat-cards" style="grid-template-columns:repeat(4,1fr)">
              <div class="stat-card red"><div class="label">待审核商家</div><div class="value">{{ dashboard.pendingMerchants || 0 }}</div></div>
              <div class="stat-card"><div class="label">待处理订单</div><div class="value">{{ dashboard.pendingOrders || 0 }}</div></div>
              <div class="stat-card green"><div class="label">今日订单</div><div class="value">{{ dashboard.todayOrders || 0 }}</div></div>
              <div class="stat-card blue"><div class="label">上架商品数</div><div class="value">{{ dashboard.storeTypeStats?.product || 0 }}</div></div>
            </div>
            <!-- 店铺类型分布 -->
            <div class="table-card" v-if="dashboard.storeTypeStats">
              <h4 style="margin-bottom:16px">📊 店铺类型分布</h4>
              <div style="display:flex;gap:24px;flex-wrap:wrap">
                <div v-for="(count, type) in dashboard.storeTypeStats" :key="type" style="text-align:center;padding:16px 24px;background:#f8f9fa;border-radius:8px;min-width:120px">
                  <div style="font-size:24px">{{ typeIcon[type] }}</div>
                  <div style="font-size:13px;color:#999;margin-top:4px">{{ typeMap[type] }}</div>
                  <div style="font-size:22px;font-weight:bold;margin-top:4px">{{ count }}</div>
                </div>
              </div>
            </div>
          </template>

          <!-- ========== 商家管理 ========== -->
          <template v-if="currentPage === 'merchants'">
            <div class="table-card">
              <div class="table-header">
                <h4>商家管理</h4>
                <div class="table-actions">
                  <el-select v-model="merchantFilter.status" placeholder="状态筛选" clearable size="small" style="width:120px" @change="loadMerchants">
                    <el-option label="待审核" :value="0"/>
                    <el-option label="已通过" :value="1"/>
                    <el-option label="已禁用" :value="2"/>
                  </el-select>
                  <el-input v-model="merchantFilter.keyword" placeholder="搜索商家" size="small" style="width:200px" clearable @keyup.enter="loadMerchants">
                    <template #append><el-button @click="loadMerchants">🔍</el-button></template>
                  </el-input>
                  <el-button size="small" @click="exportData('merchants')">📥 导出</el-button>
                </div>
              </div>
              <el-table :data="merchants" stripe v-loading="tableLoading" @row-click="showMerchantDetail" style="cursor:pointer">
                <el-table-column prop="name" label="店铺名称" min-width="120"/>
                <el-table-column prop="type" label="类型" width="100">
                  <template #default="{ row }">
                    <el-tag size="small" :class="'tag-' + row.type">{{ typeMap[row.type] }}</el-tag>
                  </template>
                </el-table-column>
                <el-table-column prop="contactName" label="联系人" width="100"/>
                <el-table-column prop="phone" label="电话" width="130"/>
                <el-table-column prop="status" label="状态" width="100">
                  <template #default="{ row }">
                    <el-tag :type="row.status === 1 ? 'success' : row.status === 0 ? 'warning' : 'danger'" size="small">
                      {{ statusMap[row.status] }}
                    </el-tag>
                  </template>
                </el-table-column>
                <el-table-column prop="createdAt" label="注册时间" width="170">
                  <template #default="{ row }">{{ formatTime(row.createdAt) }}</template>
                </el-table-column>
                <el-table-column label="操作" width="220" fixed="right">
                  <template #default="{ row }">
                    <el-button v-if="row.status === 0" type="success" size="small" @click.stop="auditMerchant(row._id, 1)">通过</el-button>
                    <el-button v-if="row.status === 0" type="danger" size="small" @click.stop="auditMerchant(row._id, 3)">拒绝</el-button>
                    <el-button v-if="row.status === 1" type="warning" size="small" @click.stop="auditMerchant(row._id, 2)">禁用</el-button>
                    <el-button v-if="row.status === 2" type="success" size="small" @click.stop="auditMerchant(row._id, 1)">启用</el-button>
                  </template>
                </el-table-column>
              </el-table>
              <div class="pagination-wrap">
                <el-pagination layout="prev, pager, next" :total="merchantTotal" :page-size="20" @current-change="p => { merchantPage = p; loadMerchants() }"/>
              </div>
            </div>
          </template>

          <!-- ========== 订单管理 ========== -->
          <template v-if="currentPage === 'orders'">
            <div class="table-card">
              <div class="table-header">
                <h4>订单管理</h4>
                <div class="table-actions">
                  <el-select v-model="orderFilter.status" placeholder="状态筛选" clearable size="small" style="width:120px" @change="loadOrders">
                    <el-option label="待处理" value="pending"/>
                    <el-option label="已支付" value="paid"/>
                    <el-option label="已完成" value="completed"/>
                    <el-option label="已取消" value="cancelled"/>
                  </el-select>
                  <el-select v-model="orderFilter.type" placeholder="类型筛选" clearable size="small" style="width:120px" @change="loadOrders">
                    <el-option label="酒店" value="hotel"/>
                    <el-option label="美食" value="food"/>
                    <el-option label="游玩" value="travel"/>
                    <el-option label="特产" value="product"/>
                  </el-select>
                  <el-input v-model="orderFilter.keyword" placeholder="搜索订单号" size="small" style="width:200px" clearable @keyup.enter="loadOrders">
                    <template #append><el-button @click="loadOrders">🔍</el-button></template>
                  </el-input>
                  <el-button size="small" @click="exportData('orders')">📥 导出</el-button>
                </div>
              </div>
              <el-table :data="orders" stripe v-loading="tableLoading" @row-click="showOrderDetail" style="cursor:pointer">
                <el-table-column prop="orderNo" label="订单号" width="160"/>
                <el-table-column prop="type" label="类型" width="80">
                  <template #default="{ row }"><el-tag size="small" :class="'tag-' + row.type">{{ typeMap[row.type] }}</el-tag></template>
                </el-table-column>
                <el-table-column prop="storeName" label="店铺" min-width="120"/>
                <el-table-column prop="totalPrice" label="金额" width="100">
                  <template #default="{ row }"><span style="color:#E8885A;font-weight:bold">¥{{ row.totalPrice }}</span></template>
                </el-table-column>
                <el-table-column prop="status" label="状态" width="100">
                  <template #default="{ row }">
                    <el-tag :type="orderStatusType[row.status]" size="small">{{ orderStatusMap[row.status] }}</el-tag>
                  </template>
                </el-table-column>
                <el-table-column prop="createdAt" label="下单时间" width="170">
                  <template #default="{ row }">{{ formatTime(row.createdAt) }}</template>
                </el-table-column>
              </el-table>
              <div class="pagination-wrap">
                <el-pagination layout="prev, pager, next" :total="orderTotal" :page-size="20" @current-change="p => { orderPage = p; loadOrders() }"/>
              </div>
            </div>
          </template>

          <!-- ========== 店铺管理 ========== -->
          <template v-if="currentPage === 'stores'">
            <div class="table-card">
              <div class="table-header">
                <h4>店铺管理</h4>
                <div class="table-actions">
                  <el-select v-model="storeFilter.type" placeholder="类型筛选" clearable size="small" style="width:120px" @change="loadStores">
                    <el-option label="酒店民宿" value="hotel"/>
                    <el-option label="美食" value="food"/>
                    <el-option label="游玩" value="travel"/>
                  </el-select>
                  <el-select v-model="storeFilter.status" placeholder="状态筛选" clearable size="small" style="width:120px" @change="loadStores">
                    <el-option label="上架中" :value="1"/>
                    <el-option label="已下架" :value="0"/>
                  </el-select>
                </div>
              </div>
              <el-table :data="stores" stripe v-loading="tableLoading" @row-click="showStoreDetail" style="cursor:pointer">
                <el-table-column prop="name" label="店铺名称" min-width="140"/>
                <el-table-column prop="type" label="类型" width="100">
                  <template #default="{ row }"><el-tag size="small" :class="'tag-' + row.type">{{ typeMap[row.type] }}</el-tag></template>
                </el-table-column>
                <el-table-column prop="address" label="地址" min-width="180" show-overflow-tooltip/>
                <el-table-column prop="score" label="评分" width="80"/>
                <el-table-column prop="minPrice" label="起步价" width="80">
                  <template #default="{ row }"><span style="color:#E8885A">¥{{ row.minPrice || '-' }}</span></template>
                </el-table-column>
                <el-table-column prop="status" label="状态" width="100">
                  <template #default="{ row }">
                    <el-tag :type="row.status === 1 ? 'success' : 'info'" size="small">{{ row.status === 1 ? '上架' : '下架' }}</el-tag>
                  </template>
                </el-table-column>
                <el-table-column label="操作" width="120">
                  <template #default="{ row }">
                    <el-button size="small" @click.stop="toggleStoreStatus(row)">{{ row.status === 1 ? '下架' : '上架' }}</el-button>
                  </template>
                </el-table-column>
              </el-table>
              <div class="pagination-wrap">
                <el-pagination layout="prev, pager, next" :total="storeTotal" :page-size="20" @current-change="p => { storePage = p; loadStores() }"/>
              </div>
            </div>
          </template>

          <!-- ========== 商品管理 ========== -->
          <template v-if="currentPage === 'products'">
            <div class="table-card">
              <div class="table-header">
                <h4>商品管理</h4>
                <div class="table-actions">
                  <el-select v-model="productFilter.status" placeholder="状态筛选" clearable size="small" style="width:120px" @change="loadProducts">
                    <el-option label="上架中" :value="1"/>
                    <el-option label="已下架" :value="0"/>
                  </el-select>
                  <el-input v-model="productFilter.keyword" placeholder="搜索商品名" size="small" style="width:200px" clearable @keyup.enter="loadProducts">
                    <template #append><el-button @click="loadProducts">🔍</el-button></template>
                  </el-input>
                </div>
              </div>
              <el-table :data="products" stripe v-loading="tableLoading">
                <el-table-column label="图片" width="80">
                  <template #default="{ row }">
                    <el-image v-if="row.coverImage" :src="row.coverImage" style="width:50px;height:50px;border-radius:6px" fit="cover" :preview-src-list="row.images || [row.coverImage]"/>
                    <span v-else style="color:#ccc">无图</span>
                  </template>
                </el-table-column>
                <el-table-column prop="name" label="商品名称" min-width="140"/>
                <el-table-column prop="category" label="分类" width="100"/>
                <el-table-column prop="price" label="售价" width="90">
                  <template #default="{ row }"><span style="color:#E8885A;font-weight:bold">¥{{ row.price }}</span></template>
                </el-table-column>
                <el-table-column prop="stock" label="库存" width="70"/>
                <el-table-column prop="sales" label="销量" width="70"/>
                <el-table-column prop="canDeliverToRoom" label="送到房间" width="90">
                  <template #default="{ row }">
                    <el-tag :type="row.canDeliverToRoom ? 'success' : 'info'" size="small">{{ row.canDeliverToRoom ? '✓' : '✗' }}</el-tag>
                  </template>
                </el-table-column>
                <el-table-column prop="status" label="状态" width="80">
                  <template #default="{ row }">
                    <el-tag :type="row.status === 1 ? 'success' : 'info'" size="small">{{ row.status === 1 ? '上架' : '下架' }}</el-tag>
                  </template>
                </el-table-column>
                <el-table-column label="操作" width="120">
                  <template #default="{ row }">
                    <el-button size="small" @click="toggleProductStatus(row)">{{ row.status === 1 ? '下架' : '上架' }}</el-button>
                  </template>
                </el-table-column>
              </el-table>
              <div class="pagination-wrap">
                <el-pagination layout="prev, pager, next" :total="productTotal" :page-size="20" @current-change="p => { productPage = p; loadProducts() }"/>
              </div>
            </div>
          </template>

          <!-- ========== 轮播图管理 ========== -->
          <template v-if="currentPage === 'banners'">
            <div class="table-card">
              <div class="table-header">
                <h4>轮播图管理</h4>
                <el-button type="primary" size="small" @click="showBannerDialog()">+ 添加轮播图</el-button>
              </div>
              <el-table :data="banners" stripe v-loading="tableLoading">
                <el-table-column prop="imageUrl" label="图片" width="120">
                  <template #default="{ row }"><el-image :src="row.imageUrl" style="width:80px;height:50px;border-radius:6px" fit="cover" :preview-src-list="[row.imageUrl]"/></template>
                </el-table-column>
                <el-table-column prop="linkUrl" label="跳转链接" min-width="200" show-overflow-tooltip/>
                <el-table-column prop="sort" label="排序" width="80"/>
                <el-table-column prop="status" label="状态" width="80">
                  <template #default="{ row }"><el-tag :type="row.status === 1 ? 'success' : 'info'" size="small">{{ row.status === 1 ? '启用' : '禁用' }}</el-tag></template>
                </el-table-column>
                <el-table-column label="操作" width="160">
                  <template #default="{ row }">
                    <el-button size="small" @click="showBannerDialog(row)">编辑</el-button>
                    <el-button size="small" type="danger" @click="deleteBanner(row._id)">删除</el-button>
                  </template>
                </el-table-column>
              </el-table>
            </div>
          </template>

          <!-- ========== 评价管理 ========== -->
          <template v-if="currentPage === 'reviews'">
            <!-- 评价概览 -->
            <div class="stat-cards" style="grid-template-columns:repeat(5,1fr);margin-bottom:20px">
              <div class="stat-card"><div class="label">总评价数</div><div class="value">{{ reviewStats.total || 0 }}</div><div class="extra">💬</div></div>

    <el-dialog v-model="userDetailVisible" title="👤 用户详情" width="600px">
      <template v-if="userDetail._id">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
          <el-avatar :src="userDetail.avatarUrl" :size="60">{{ (userDetail.nickName || '用')[0] }}</el-avatar>
          <div>
            <div style="font-size:18px;font-weight:bold">{{ userDetail.nickName || '未设置昵称' }}</div>
            <div style="font-size:12px;color:#999;margin-top:4px">{{ userDetail.openid }}</div>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-row"><span class="label">性别</span><span class="value">{{ ['未知','男','女'][userDetail.gender || 0] }}</span></div>
          <div class="detail-row"><span class="label">注册时间</span><span class="value">{{ formatTime(userDetail.createdAt) }}</span></div>

          <el-table :data="userDetail.recentOrders" size="small" stripe>
            <el-table-column prop="orderNo" label="订单号" width="160"/>
            <el-table-column prop="storeName" label="店铺" min-width="100"/>
            <el-table-column prop="totalPrice" label="金额" width="80">
              <template #default="{ row }"><span style="color:#E8885A">¥{{ row.totalPrice }}</span></template>
            </el-table-column>
            <el-table-column prop="status" label="状态" width="80">
              <template #default="{ row }"><el-tag :type="orderStatusType[row.status]" size="small">{{ orderStatusMap[row.status] }}</el-tag></template>

    <!-- ====== 轮播图编辑弹窗 ====== -->

        <el-form-item label="图片">
          <div>
            <el-input v-model="bannerForm.imageUrl" placeholder="图片URL（或点击上传）" style="margin-bottom:8px"/>
            <el-upload :show-file-list="false" :http-request="uploadBannerImage" accept="image/*">
              <el-button size="small">📤 上传图片</el-button>
            </el-upload>
            <el-image v-if="bannerForm.imageUrl" :src="bannerForm.imageUrl" style="width:200px;height:120px;margin-top:8px;border-radius:8px" fit="cover"/>
          </div>
        </el-form-item>
        <el-form-item label="跳转链接">
          <el-input v-model="bannerForm.linkUrl" placeholder="如: /pages/hotel/hotel"/>
        </el-form-item>
        <el-form-item label="排序">
          <el-input-number v-model="bannerForm.sort" :min="0" :max="99"/>
        </el-form-item>
        <el-form-item label="状态">
          <el-switch v-model="bannerForm.status" :active-value="1" :inactive-value="0" active-text="启用" inactive-text="禁用"/>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="bannerDialogVisible = false">取消</el-button>
        <el-button type="primary" @click="saveBanner">保存</el-button>
      </template>
    </el-dialog>

    <!-- ====== 修改密码弹窗 ====== -->
    <el-dialog v-model="showPasswordDialog" title="🔑 修改管理员密码" width="400px">
      <el-form label-width="80px">
        <el-form-item label="当前密码">
          <el-input v-model="passwordForm.old" type="password" show-password placeholder="输入当前密码"/>
        </el-form-item>
        <el-form-item label="新密码">
          <el-input v-model="passwordForm.new" type="password" show-password placeholder="至少6位"/>
        </el-form-item>
        <el-form-item label="确认密码">
          <el-input v-model="passwordForm.confirm" type="password" show-password placeholder="再次输入"/>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="showPasswordDialog = false">取消</el-button>
        <el-button type="primary" @click="changePassword">确认修改</el-button>
      </template>
    </el-dialog>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.15/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.full.min.js"></script>
  <script>
    const { createApp, ref, computed, onMounted, watch } = Vue

    const CLOUD_ENV = 'cloud1-5gtgqlar51205e68'
    const CLOUD_BASE = `https://${CLOUD_ENV}-1422786062.ap-shanghai.app.tcloudbase.com/admin`

    const app = createApp({
      setup() {
        // ====== 登录 ======
        const logged = ref(!!localStorage.getItem('admin_token'))
        const token = ref(localStorage.getItem('admin_token') || '')
        const loginForm = ref({ password: '' })
        const loginLoading = ref(false)

        // ====== 菜单 ======
        const menuItems = [
          { key: 'dashboard', icon: '📊', label: '数据概览' },
          { key: 'merchants', icon: '🏪', label: '商家管理' },
          { key: 'orders', icon: '📋', label: '订单管理' },
          { key: 'stores', icon: '🏨', label: '店铺管理' },
          { key: 'products', icon: '🎁', label: '商品管理' },
          { key: 'banners', icon: '🖼️', label: '轮播图管理' },
          { key: 'reviews', icon: '⭐', label: '评价管理' },
          { key: 'notify', icon: '🔔', label: '消息推送' },
          { key: 'users', icon: '👤', label: '用户管理' },
          { key: 'settings', icon: '⚙️', label: '系统设置' }
        ]
        const currentPage = ref('dashboard')
        const currentTitle = computed(() => menuItems.find(m => m.key === currentPage.value)?.label || '')
        const currentTime = ref('')
        const tableLoading = ref(false)

        // ====== 数据映射 ======
        const typeMap = { hotel: '酒店民宿', food: '美食', travel: '游玩', product: '特产' }
        const typeIcon = { hotel: '🏨', food: '🍜', travel: '🗺️', product: '🎁' }
        const statusMap = { 0: '待审核', 1: '已通过', 2: '已禁用', 3: '已拒绝' }
        const orderStatusMap = { pending: '待处理', paid: '已支付', completed: '已完成', cancelled: '已取消', rejected: '已拒绝', refunded: '已退款' }
        const orderStatusType = { pending: 'warning', paid: 'success', completed: 'info', cancelled: 'danger', rejected: 'danger', refunded: 'info' }

        // ====== 数据 ======
        const dashboard = ref({})
        const merchants = ref([]); const merchantTotal = ref(0); const merchantPage = ref(1); const merchantFilter = ref({ status: '', keyword: '' })
        const orders = ref([]); const orderTotal = ref(0); const orderPage = ref(1); const orderFilter = ref({ status: '', keyword: '', type: '' })
        const stores = ref([]); const storeTotal = ref(0); const storePage = ref(1); const storeFilter = ref({ type: '', status: '' })
        const products = ref([]); const productTotal = ref(0); const productPage = ref(1); const productFilter = ref({ status: '', keyword: '' })
        const banners = ref([])
        const users = ref([]); const userTotal = ref(0); const userPage = ref(1); const userFilter = ref({ keyword: '' })

        // 评价
        const reviews = ref([]); const reviewTotal = ref(0); const reviewPage = ref(1)
        const reviewFilter = ref({ rating: '', status: '', keyword: '' })
        const reviewStats = ref({ total: 0, avgRating: 0, ratingDist: {5:0,4:0,3:0,2:0,1:0}, hidden: 0 })

        // 消息推送
        const notifyStats = ref({ total: 0, success: 0, failed: 0, todayCount: 0 })
        const notifyLogs = ref([]); const notifyLogTotal = ref(0); const notifyLogPage = ref(1)
        const notifyLogFilter = ref({ type: '', status: '' })
        const notifySending = ref(false)
        const manualNotifyForm = ref({ orderNo: '', type: 'orderPaid' })
        const notifyTypeMap = { orderPaid: '支付通知', orderCompleted: '完成通知', orderCancelled: '取消通知', merchantNewOrder: '新订单通知' }
        const notifyTypeTag = { orderPaid: 'success', orderCompleted: 'info', orderCancelled: 'danger', merchantNewOrder: 'warning' }
        const notifyTemplates = [
          { key: 'orderPaid', name: '订单支付成功', desc: '用户支付成功后发送', fields: '店铺名称、订单号、订单类型、金额、状态' },
          { key: 'orderCompleted', name: '订单完成通知', desc: '确认完成时发送', fields: '店铺名称、订单号、订单类型、金额、状态' },
          { key: 'orderCancelled', name: '订单取消通知', desc: '订单取消时发送', fields: '店铺名称、订单号、订单类型、金额、状态' },
          { key: 'merchantNewOrder', name: '商户新订单通知', desc: '用户下单后通知商户', fields: '店铺名称、订单号、订单类型、金额、提醒' }
        ]

        // ====== 弹窗 ======
        const orderDetailVisible = ref(false); const orderDetail = ref({})
        const merchantDetailVisible = ref(false); const merchantDetail = ref({})
        const storeDetailVisible = ref(false); const storeDetail = ref({})
        const reviewDetailVisible = ref(false); const reviewDetail = ref({})
        const userDetailVisible = ref(false); const userDetail = ref({})
        const bannerDialogVisible = ref(false); const bannerForm = ref({ imageUrl: '', linkUrl: '', sort: 0, status: 1 })
        const showPasswordDialog = ref(false)
        const passwordForm = ref({ old: '', new: '', confirm: '' })

        // 系统设置
        const cloudFunctions = ['login', 'order', 'pay', 'merchant', 'review', 'notify', 'db', 'admin']
        const dbCollections = [
          { name: 'users', desc: '用户信息', side: '用户端' },
          { name: 'stores', desc: '店铺信息', side: '商户端写/用户端读' },
          { name: 'merchants', desc: '商户账号', side: '商户端' },
          { name: 'rooms', desc: '房型信息', side: '商户端写/用户端读' },
          { name: 'products', desc: '特产商品', side: '商户端写/用户端读' },
          { name: 'orders', desc: '订单', side: '双端读写' },
          { name: 'banners', desc: '首页轮播图', side: '管理后台' },
          { name: 'reviews', desc: '评价', side: '用户端写/商户端读' },
          { name: 'addresses', desc: '收货地址', side: '用户端' },
          { name: 'coupons', desc: '优惠券', side: '管理后台' },
          { name: 'user_coupons', desc: '用户优惠券', side: '用户端' },
          { name: 'user_subscribes', desc: '订阅消息记录', side: '用户端' },
          { name: 'notify_logs', desc: '推送日志', side: '云函数' },
          { name: 'admin_config', desc: '管理后台配置', side: '管理后台' }
        ]

        // ====== 工具函数 ======
        function formatTime(date) {
          if (!date) return '-'
          const d = new Date(date)
          if (isNaN(d.getTime())) return String(date)
          const y = d.getFullYear()
          const m = String(d.getMonth() + 1).padStart(2, '0')
          const day = String(d.getDate()).padStart(2, '0')
          const h = String(d.getHours()).padStart(2, '0')
          const min = String(d.getMinutes()).padStart(2, '0')
          return `${y}-${m}-${day} ${h}:${min}`
        }

        async function call(action, data = {}) {
          const body = { action, token: token.value, ...data }
          try {
            const res = await fetch(CLOUD_BASE, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body)
            })
            return await res.json()
          } catch (e) {
            console.error('API error:', e)
            ElMessage.error('网络请求失败')
            return { code: -1, msg: e.message }
          }
        }

        // ====== 登录/退出 ======
        async function doLogin() {
          if (!loginForm.value.password) return ElMessage.warning('请输入密码')
          loginLoading.value = true
          const res = await call('login', { password: loginForm.value.password })
          loginLoading.value = false
          if (res.code === 0) {
            token.value = res.token
            localStorage.setItem('admin_token', res.token)
            logged.value = true
            ElMessage.success('登录成功')
            loadDashboard()
          } else {
            ElMessage.error(res.msg || '登录失败')
          }
        }
        function doLogout() {
          token.value = ''
          localStorage.removeItem('admin_token')
          logged.value = false
        }

        // ====== 数据加载 ======
        async function loadDashboard() {
          const res = await call('dashboard')
          if (res.code === 0) dashboard.value = res.data
        }
        async function loadMerchants() {
          tableLoading.value = true
          const res = await call('merchantList', { page: merchantPage.value, ...merchantFilter.value })
          tableLoading.value = false
          if (res.code === 0) { merchants.value = res.data; merchantTotal.value = res.total }
        }
        async function loadOrders() {
          tableLoading.value = true
          const res = await call('orderList', { page: orderPage.value, ...orderFilter.value })
          tableLoading.value = false
          if (res.code === 0) { orders.value = res.data; orderTotal.value = res.total }
        }
        async function loadStores() {
          tableLoading.value = true
          const res = await call('storeList', { page: storePage.value, ...storeFilter.value })
          tableLoading.value = false
          if (res.code === 0) { stores.value = res.data; storeTotal.value = res.total }
        }
        async function loadProducts() {
          tableLoading.value = true
          const res = await call('productList', { page: productPage.value, ...productFilter.value })
          tableLoading.value = false
          if (res.code === 0) { products.value = res.data; productTotal.value = res.total }
        }
        async function loadBanners() {
          tableLoading.value = true
          const res = await call('bannerList')
          tableLoading.value = false
          if (res.code === 0) banners.value = res.data
        }
        async function loadUsers() {
          tableLoading.value = true
          const res = await call('userList', { page: userPage.value, ...userFilter.value })
          tableLoading.value = false
          if (res.code === 0) { users.value = res.data; userTotal.value = res.total }
        }
        async function loadReviews() {
          tableLoading.value = true
          const res = await call('reviewList', { page: reviewPage.value, ...reviewFilter.value })
          tableLoading.value = false
          if (res.code === 0) { reviews.value = res.data; reviewTotal.value = res.total }
        }
        async function loadReviewStats() {
          const res = await call('reviewStats')
          if (res.code === 0) reviewStats.value = res.data
        }
        async function loadNotifyStats() {
          const res = await call('notifyStats')
          if (res.code === 0) notifyStats.value = res.data
        }
        async function loadNotifyLogs() {
          tableLoading.value = true
          const res = await call('notifyLogs', { page: notifyLogPage.value, ...notifyLogFilter.value })
          tableLoading.value = false
          if (res.code === 0) { notifyLogs.value = res.data; notifyLogTotal.value = res.total }
        }

        // ====== 详情弹窗 ======
        async function showOrderDetail(row) {
          const res = await call('orderDetail', { orderId: row._id })
          if (res.code === 0) { orderDetail.value = res.data; orderDetailVisible.value = true }
        }
        async function showMerchantDetail(row) {
          const res = await call('merchantDetail', { merchantId: row._id })
          if (res.code === 0) { merchantDetail.value = res.data; merchantDetailVisible.value = true }
        }
        async function showStoreDetail(row) {
          const res = await call('storeDetail', { storeId: row._id })
          if (res.code === 0) { storeDetail.value = res.data; storeDetailVisible.value = true }
        }
        async function showReviewDetail(row) {
          const res = await call('reviewDetail', { reviewId: row._id })
          if (res.code === 0) { reviewDetail.value = res.data; reviewDetailVisible.value = true }
        }
        async function showUserDetail(row) {
          const res = await call('userDetail', { userId: row._id })
          if (res.code === 0) { userDetail.value = res.data; userDetailVisible.value = true }
        }

        // ====== 操作 ======
        async function auditMerchant(id, status) {
          const msg = status === 1 ? '确定通过审核？' : status === 3 ? '确定拒绝此商家？' : status === 2 ? '确定禁用此商家？' : ''
          try { await ElMessageBox.confirm(msg, '提示') } catch { return }
          const res = await call('merchantAudit', { merchantId: id, status })
          if (res.code === 0) { ElMessage.success(res.msg); loadMerchants() }
        }
        async function toggleStoreStatus(row) {
          const newStatus = row.status === 1 ? 0 : 1
          const res = await call('storeUpdate', { storeId: row._id, data: { status: newStatus } })
          if (res.code === 0) { ElMessage.success(res.msg); loadStores() }
        }
        async function toggleProductStatus(row) {
          const newStatus = row.status === 1 ? 0 : 1
          const res = await call('productUpdate', { productId: row._id, data: { status: newStatus } })
          if (res.code === 0) { ElMessage.success(res.msg); loadProducts() }
        }
        async function hideReview(id) {
          const res = await call('reviewHide', { reviewId: id })
          if (res.code === 0) { ElMessage.success(res.msg); loadReviews(); loadReviewStats() }
        }
        async function showReview(id) {
          const res = await call('reviewShow', { reviewId: id })
          if (res.code === 0) { ElMessage.success(res.msg); loadReviews(); loadReviewStats() }
        }
        async function deleteReview(id) {
          try { await ElMessageBox.confirm('确定删除此评价？删除后不可恢复', '警告', { type: 'warning' }) } catch { return }
          const res = await call('reviewDelete', { reviewId: id })
          if (res.code === 0) { ElMessage.success(res.msg); loadReviews(); loadReviewStats() }
        }

        // ====== 轮播图 ======
        function showBannerDialog(banner) {
          bannerForm.value = banner ? { ...banner } : { imageUrl: '', linkUrl: '', sort: 0, status: 1 }
          bannerDialogVisible.value = true
        }
        async function uploadBannerImage(options) {
          const file = options.file
          const cloudPath = `banners/${Date.now()}_${Math.random().toString(36).slice(2)}.${file.name.split('.').pop()}`
          try {
            // 使用云存储上传
            const result = await wx.cloud.uploadFile({ cloudPath, filePath: file })
            // 注意：管理后台是网页端，无法直接用 wx.cloud
            // 改为使用 FileReader 转 base64 或提示用户填URL
            ElMessage.info('网页端暂不支持直接上传，请填写图片URL')
          } catch (e) {
            ElMessage.error('上传失败，请直接输入图片URL')
          }
        }
        async function saveBanner() {
          const data = { ...bannerForm.value }
          const action = data._id ? 'bannerUpdate' : 'bannerAdd'
          const payload = data._id ? { bannerId: data._id, data } : { bannerData: data }
          const res = await call(action, payload)
          if (res.code === 0) { ElMessage.success(res.msg); bannerDialogVisible.value = false; loadBanners() }
        }
        async function deleteBanner(id) {
          try { await ElMessageBox.confirm('确定删除此轮播图？', '提示') } catch { return }
          const res = await call('bannerDelete', { bannerId: id })
          if (res.code === 0) { ElMessage.success(res.msg); loadBanners() }
        }

        // ====== 消息推送 ======
        async function sendManualNotify() {
          if (!manualNotifyForm.value.orderNo) return ElMessage.warning('请输入订单号')
          notifySending.value = true
          const orderRes = await call('orderList', { keyword: manualNotifyForm.value.orderNo })
          if (orderRes.code !== 0 || orderRes.data.length === 0) {
            notifySending.value = false
            return ElMessage.error('未找到该订单')
          }
          const orderId = orderRes.data[0]._id
          const notifyType = manualNotifyForm.value.type
          const res = await call('notifySend', { orderId, notifyType })
          notifySending.value = false
          if (res.code === 0) {
            ElMessage.success(res.msg || '发送成功')
            manualNotifyForm.value.orderNo = ''
            loadNotifyLogs(); loadNotifyStats()
          } else {
            ElMessage.error(res.msg || '发送失败')
          }
        }

        // ====== 密码修改 ======
        async function changePassword() {
          const { old: oldPwd, new: newPwd, confirm: confirmPwd } = passwordForm.value
          if (!oldPwd) return ElMessage.warning('请输入当前密码')
          if (!newPwd || newPwd.length < 6) return ElMessage.warning('新密码至少6位')
          if (newPwd !== confirmPwd) return ElMessage.warning('两次密码不一致')
          const res = await call('changePassword', { oldPassword: oldPwd, newPassword: newPwd })
          if (res.code === 0) {
            ElMessage.success('密码修改成功')
            showPasswordDialog.value = false
            passwordForm.value = { old: '', new: '', confirm: '' }
          } else {
            ElMessage.error(res.msg || '修改失败')
          }
        }

        // ====== 数据导出 ======
        function exportData(type) {
          const url = `${CLOUD_BASE}`
          const body = { action: type === 'orders' ? 'exportOrders' : 'exportMerchants', token: token.value }
          fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
            .then(r => r.json())
            .then(res => {
              if (res.code === 0 && res.csv) {
                const blob = new Blob(['\uFEFF' + res.csv], { type: 'text/csv;charset=utf-8' })
                const url = URL.createObjectURL(blob)
                const a = document.createElement('a')
                a.href = url
                a.download = `${type}_${new Date().toISOString().slice(0, 10)}.csv`
                a.click()
                URL.revokeObjectURL(url)
                ElMessage.success(`导出 ${res.total} 条数据`)
              } else {
                ElMessage.error(res.msg || '导出失败')
              }
            })
            .catch(() => ElMessage.error('导出失败'))
        }

        // ====== 刷新 ======
        function refreshPage() {
          const loaders = {
            dashboard: loadDashboard, merchants: loadMerchants, orders: loadOrders,
            stores: loadStores, products: loadProducts, banners: loadBanners,
            reviews: () => { loadReviews(); loadReviewStats() },
            notify: () => { loadNotifyLogs(); loadNotifyStats() },
            users: loadUsers
          }
          loaders[currentPage.value]?.()
        }

        watch(currentPage, (key) => {
          const loaders = {
            dashboard: loadDashboard, merchants: loadMerchants, orders: loadOrders,
            stores: loadStores, products: loadProducts, banners: loadBanners,
            reviews: () => { loadReviews(); loadReviewStats() },
            notify: () => { loadNotifyLogs(); loadNotifyStats() },
            users: loadUsers
          }
          loaders[key]?.()
        })

        // 时钟
        setInterval(() => {
          currentTime.value = new Date().toLocaleString('zh-CN')
        }, 1000)

        onMounted(() => {
          if (logged.value) loadDashboard()
        })

        return {
